# `docker compose up` brings up the full hearme v0 stack: shared Postgres,
# broker, web, the self-bridge, and a dev skill instance.
#
# First run:
#   docker compose up --build
# Then open http://localhost:3000.
#
# Onboarding requires REAL Self proofs (verified once at the broker's
# /v1/register). With SELF_MOCK_PASSPORT=1 (staging) you can scan a *mock
# passport*:
#   docker compose exec skill hearme-skill onboard \
#     --bridge-url http://self-bridge:8787 --broker-url http://broker:8000
# (Install the Self app, tap the passport button 5x to create a mock passport,
# scan each QR.)
#
# To wipe state and start from scratch:
#   docker compose down -v && docker compose up --build
services:
  postgres:
    image: postgres:16
    container_name: hearme-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hearme
      POSTGRES_USER: hearme_admin
      POSTGRES_PASSWORD: hearme_admin_dev
    ports:
      - "5432:5432"
    volumes:
      - hearme-pgdata:/var/lib/postgresql/data
      # Schema + roles + seed are applied on first container start, in alpha order.
      # 01: tables (canonical migration owned by hearme-web)
      # 02: roles + grants
      # 03: demo seed data (questions/envelopes/aggregates across scopes)
      - ./packages/web/drizzle/0000_init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/init/02-roles.sql:/docker-entrypoint-initdb.d/02-roles.sql:ro
      - ./db/init/03-seed.sql:/docker-entrypoint-initdb.d/03-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hearme_admin -d hearme"]
      interval: 3s
      timeout: 3s
      retries: 20

  broker:
    build:
      context: .
      dockerfile: packages/broker/Dockerfile
    container_name: hearme-broker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      self-bridge:
        condition: service_started
    environment:
      # asyncpg DSN. scheme must be `postgres://` (asyncpg-style).
      HEARME_BROKER_DATABASE_URL: postgres://hearme_broker:hearme_broker_dev@postgres:5432/hearme
      # Self proofs are verified once (at /v1/register) via the bridge the broker controls.
      HEARME_BROKER_SELF_BRIDGE_URL: http://self-bridge:8787
      # Dev: no Celo RPC wired into the bridge, so skip the on-chain registry
      # gate. Set to "1" (and wire SELF_CELO_RPC_URL on the bridge) for the
      # Sybil-hardening check. See ARCHITECTURE.md §5 / SELF_MIGRATION.md.
      HEARME_BROKER_REQUIRE_REGISTRY_CONFIRMATION: "0"
      # Dev signing key for the broker-issued DelegationToken. OVERRIDE in prod.
      HEARME_BROKER_SIGNING_KEY: QlJPS0VSLVNJR05JTkctS0VZLUhFQVJNRS1ERVYzMkI=
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=2).read()"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s

  self-bridge:
    build:
      context: .
      dockerfile: packages/self-bridge/Dockerfile
    container_name: hearme-self-bridge
    restart: unless-stopped
    environment:
      SELF_SCOPE: hearme-v1
      SELF_ENDPOINT: http://self-bridge:8787/callback
      SELF_ENDPOINT_TYPE: staging_https
      # mockPassport=1 accepts mock-passport proofs (staging/Celo Sepolia). Set 0
      # (mainnet) in production.
      SELF_MOCK_PASSPORT: "1"
      SELF_AGE_THRESHOLDS: "18,25,35,50,65"
      # Sybil hardening (registration-only on-chain check). Leave empty in dev;
      # set the Celo RPC URL + registry address to enable. See SELF_MIGRATION.md.
      # SELF_CELO_RPC_URL: https://forno.celo-sepolia.celo-testnet.org
      # SELF_REGISTRY_ADDRESS: "0x..."
    ports:
      - "8787:8787"

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    container_name: hearme-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # postgres-js DSN. scheme `postgres://` works for both Drizzle's
      # postgres driver and the Next.js runtime.
      DATABASE_URL: postgres://hearme_web:hearme_web_dev@postgres:5432/hearme
      NODE_ENV: production
    ports:
      - "3000:3000"

  skill:
    build:
      context: .
      dockerfile: packages/skill/Dockerfile
    container_name: hearme-skill
    restart: unless-stopped
    depends_on:
      broker:
        condition: service_healthy
      self-bridge:
        condition: service_started
    environment:
      HEARME_SKILL_BROKER_URL: http://broker:8000
      HEARME_SKILL_SELF_BRIDGE_URL: http://self-bridge:8787
      HEARME_SKILL_ROOT_DIR: /data
      # Faster poll than the 30s default so the demo feels responsive.
      HEARME_SKILL_POLL_INTERVAL_SECONDS: "5"
      # Optional: path (inside the container) to a captured GET /requests/<id>
      # JSON to replay offline via mock-onboard.py. Without it, onboard by
      # scanning a (mock) passport — see the header of this file.
      # HEARME_SKILL_DEV_FIXTURE: /data/fixture.json
    volumes:
      - hearme-skill-data:/data

volumes:
  hearme-pgdata:
  hearme-skill-data:
