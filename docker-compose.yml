# `docker compose up` brings up the hearme v0 *server* stack: shared Postgres,
# broker, web, and the self-bridge. None of these need a model-provider API key.
#
# The answering agent (the `hearme` Hermes plugin) is NOT a service here: it
# runs inside the user's own Hermes agent, which already has a model configured.
# Install it there with `pip install 'hearme-skill[hermes]'` and onboard:
#   hearme-skill onboard --bridge-url http://localhost:8787 --broker-url http://localhost:8000
#   hearme-skill schedule   # registers the answering cron job inside Hermes
#
# First run:
#   docker compose up --build
# Then open http://localhost:3000.
#
# Onboarding requires REAL Self proofs (verified once at the broker's
# /v1/register). With SELF_MOCK_PASSPORT=1 (staging) you can scan a *mock
# passport* (install the Self app, tap the passport button 5x to create a mock
# passport, scan each QR).
#
# To wipe state and start from scratch:
#   docker compose down -v && docker compose up --build
services:
  postgres:
    image: postgres:16
    container_name: hearme-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hearme
      POSTGRES_USER: hearme_admin
      POSTGRES_PASSWORD: hearme_admin_dev
    ports:
      - "5432:5432"
    volumes:
      - hearme-pgdata:/var/lib/postgresql/data
      # Schema + roles + seed are applied on first container start, in alpha order.
      # 01: tables (canonical migration owned by hearme-web)
      # 02: roles + grants
      # 03: demo seed data (questions/envelopes/aggregates across scopes)
      - ./packages/web/drizzle/0000_init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/init/02-roles.sql:/docker-entrypoint-initdb.d/02-roles.sql:ro
      - ./db/init/03-seed.sql:/docker-entrypoint-initdb.d/03-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hearme_admin -d hearme"]
      interval: 3s
      timeout: 3s
      retries: 20

  broker:
    build:
      context: .
      dockerfile: packages/broker/Dockerfile
    container_name: hearme-broker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      self-bridge:
        condition: service_started
    environment:
      # asyncpg DSN. scheme must be `postgres://` (asyncpg-style).
      HEARME_BROKER_DATABASE_URL: postgres://hearme_broker:hearme_broker_dev@postgres:5432/hearme
      # Self proofs are verified once (at /v1/register) via the bridge the broker controls.
      HEARME_BROKER_SELF_BRIDGE_URL: http://self-bridge:8787
      # Dev: no Celo RPC wired into the bridge, so skip the on-chain registry
      # gate. Set to "1" (and wire SELF_CELO_RPC_URL on the bridge) for the
      # Sybil-hardening check. See ARCHITECTURE.md §5 / SELF_MIGRATION.md.
      HEARME_BROKER_REQUIRE_REGISTRY_CONFIRMATION: "0"
      # Dev signing key for the broker-issued DelegationToken. OVERRIDE in prod.
      HEARME_BROKER_SIGNING_KEY: QlJPS0VSLVNJR05JTkctS0VZLUhFQVJNRS1ERVYzMkI=
      # Optional production hook: poll Self on-chain identity invalidation/update
      # events and revoke matching Hearme registrations + accepted votes.
      HEARME_BROKER_SELF_REVOCATION_LISTENER_ENABLED: "0"
      # HEARME_BROKER_SELF_REVOCATION_RPC_URL: https://forno.celo.org
      # HEARME_BROKER_SELF_REVOCATION_CONTRACT_ADDRESS: "0x..."
      # HEARME_BROKER_SELF_REVOCATION_EVENT_TOPIC: "0x..."
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=2).read()"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s

  self-bridge:
    build:
      context: .
      dockerfile: packages/self-bridge/Dockerfile
    container_name: hearme-self-bridge
    restart: unless-stopped
    environment:
      SELF_SCOPE: hearme-v1
      SELF_ENDPOINT: http://self-bridge:8787/callback
      SELF_ENDPOINT_TYPE: staging_https
      # mockPassport=1 accepts mock-passport proofs (staging/Celo testnet). Set 0
      # (mainnet) in production.
      SELF_MOCK_PASSPORT: "1"
      # The Self app only offers/accepts a MOCK passport when the request is in
      # dev mode. Defaults to SELF_MOCK_PASSPORT when unset; set explicitly here.
      SELF_DEV_MODE: "1"
      # If a mock-passport scan fails on a network/root mismatch, pin the testnet
      # chain the deployed @selfxyz/core checks: Celo Alfajores 44787 or Celo
      # Sepolia 11142220. Leave unset to use the SDK default for the endpointType.
      # SELF_CHAIN_ID: "44787"
      SELF_AGE_THRESHOLDS: "18,25,35,50,65"
      # Sybil hardening (registration-only on-chain check). Leave empty in dev;
      # set the Celo RPC URL + registry address to enable. See SELF_MIGRATION.md.
      # SELF_CELO_RPC_URL: https://forno.celo-sepolia.celo-testnet.org
      # SELF_REGISTRY_ADDRESS: "0x..."
    ports:
      - "8787:8787"

  # One-shot SQL migrator. Runs every `docker compose up` (re-runs are no-ops
  # — applied versions are tracked in `_schema_migrations`). On a fresh volume,
  # postgres's docker-entrypoint-initdb.d bootstraps `0000_init.sql` first, then
  # this migrator baselines `0000_init` and applies any later deltas. On an
  # existing volume (e.g. staging across schema changes), it just applies the
  # new files. See packages/web/scripts/migrate.mjs.
  migrator:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    container_name: hearme-migrator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Admin DSN: hearme_web/hearme_broker roles can't ALTER.
      MIGRATOR_DATABASE_URL: postgres://hearme_admin:hearme_admin_dev@postgres:5432/hearme
    command: ["node", "scripts/migrate.mjs"]
    restart: "no"

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    container_name: hearme-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      # postgres-js DSN. scheme `postgres://` works for both Drizzle's
      # postgres driver and the Next.js runtime.
      DATABASE_URL: postgres://hearme_web:hearme_web_dev@postgres:5432/hearme
      # /stats reads privacy-safe aggregate counts (agents, respondents) the
      # web role can't query directly from the broker.
      BROKER_URL: http://broker:8000
      NODE_ENV: production
    ports:
      - "3000:3000"

  # NOTE: the answering agent is intentionally not a service here. It is the
  # `hearme` Hermes plugin and runs inside the user's Hermes agent (which holds
  # the model config + API key). See the header of this file to install it.

volumes:
  hearme-pgdata:
