# Hermes plugin manifest (hermes-agent >= 0.14).
#
# Canonical install:
#   1. pip-install hearme-skill into the same venv as the Hermes gateway:
#        /path/to/gateway-venv/bin/python -m pip install \
#          'git+https://github.com/josojo/hearme.git#subdirectory=packages/skill'
#   2. Drop this manifest + a tiny shim under ~/.hermes/plugins/hearme/:
#        hearme-skill install-plugin     # writes the dir + restarts the gateway
#      Equivalent by hand:
#        mkdir -p ~/.hermes/plugins/hearme && cp this-file ~/.hermes/plugins/hearme/
#        printf 'from hearme_skill.plugin import register\n' \
#          > ~/.hermes/plugins/hearme/__init__.py
#        systemctl --user restart hermes-gateway
#
# `hermes plugins install owner/repo` is NOT the install path: it clones the
# monorepo root and looks for plugin.yaml there, missing this subdirectory.
# pyproject.toml advertises the `hermes_agent.plugins` entry point as well, but
# Hermes' entry-point auto-discovery is lazy and version-dependent — the
# directory drop-in above is the deterministic path that loads at gateway boot.
name: hearme
version: 0.0.1
description: >-
  Answer public yes/no questions on the user's behalf, using the host agent's
  own model and memory. Inference needs no extra API key; a cron job drives the
  answering cycle.
author: Hearme
kind: standalone
provides_tools:
  - hearme_list_open_questions
  - hearme_submit_answer
