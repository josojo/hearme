[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hearme-skill"
version = "0.0.1"
description = "Hearme v0 Hermes skill — local agent that answers questions on the user's behalf (ARCHITECTURE.md §6-8)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Proprietary" }
authors = [{ name = "Hearme" }]
dependencies = [
    "pynacl>=1.5",
    "pydantic>=2.6",
    "pydantic-settings>=2.2",
    "httpx>=0.27",
    "aiosqlite>=0.20",
    "PyYAML>=6.0",
    "python-dateutil>=2.9",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-snapshot>=0.9",
    "ruff>=0.4",
]
# Real QR rendering is optional; the v0 onboarding flow falls back to ASCII.
qr = ["qrcode>=7.4"]

[project.entry-points."hermes.skills"]
hearme = "hearme_skill.skill:entrypoint"

[project.scripts]
hearme-skill = "hearme_skill.skill:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/hearme_skill"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
filterwarnings = [
    "ignore::DeprecationWarning",
]

[tool.ruff]
line-length = 100
target-version = "py311"
