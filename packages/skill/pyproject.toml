[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hearme-skill"
version = "0.0.1"
description = "Hearme v0 Hermes skill — local agent that answers questions on the user's behalf (ARCHITECTURE.md §6-8)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Proprietary" }
authors = [{ name = "Hearme" }]
dependencies = [
    "pynacl>=1.5",
    "pydantic>=2.6",
    "pydantic-settings>=2.2",
    "httpx>=0.27",
    "aiosqlite>=0.20",
    "PyYAML>=6.0",
    "python-dateutil>=2.9",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-snapshot>=0.9",
    "ruff>=0.4",
    # Used by tests/test_e2e_hermes.py to spin up an ephemeral Postgres
    # locally. Skipped at runtime if Docker isn't available.
    "testcontainers[postgres]>=4.0",
    "asyncpg>=0.29",
]
# Real QR rendering is optional; the v0 onboarding flow falls back to ASCII.
qr = ["qrcode>=7.4"]
# Optional: the Hermes Agent runtime (Nous Research, MIT) that HOSTS this
# plugin. Normally Hermes is already installed in the user's environment; this
# extra pins it so `pip install 'hearme-skill[hermes]'` gives a self-contained
# env for testing the plugin + cron registration. Inference uses the host
# agent's own configured model — no separate model-provider API key.
hermes = [
    "hermes-agent>=0.14",
]

# Discovered by hermes-agent's plugin loader (entry-point group
# `hermes_agent.plugins`). The value MUST resolve to the module that contains
# `register(ctx)` — NOT to the function itself. Hermes' loader calls
# `ep.load()` and then `getattr(module, "register")`; if the entry point is
# `pkg.mod:register`, ep.load() returns the function, getattr(<func>,
# "register") is None, and the loader logs "no register() function" and gives
# up. See hermes_cli/plugins.py:_load_entrypoint_module.
# Alternatively, install as a directory under ~/.hermes/plugins/ (but note
# Hermes dedupes by plugin name and the entry-point path wins, so this
# pyproject value must be correct either way).
[project.entry-points."hermes_agent.plugins"]
hearme = "hearme_skill.plugin"

[project.scripts]
hearme-skill = "hearme_skill.skill:cli"
hearme-chatgpt-memory = "hearme_skill.memory.chatgpt_export:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/hearme_skill"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
filterwarnings = [
    "ignore::DeprecationWarning",
]
markers = [
    "slow: integration tests that spin up real services (Postgres, broker, Hermes).",
]

[tool.ruff]
line-length = 100
target-version = "py311"
