[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hearme-broker"
version = "0.0.1"
description = "Hearme v0 dispatcher and envelope verifier (ARCHITECTURE.md §5)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Proprietary" }
authors = [{ name = "Hearme" }]
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "asyncpg>=0.29",
    "pynacl>=1.5",
    "pydantic>=2.6",
    "pydantic-settings>=2.2",
    "python-dateutil>=2.9",
    # Used at runtime to call the zkpassport-bridge /verify endpoint.
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "testcontainers[postgres]>=4.4",
    "ruff>=0.4",
]

[tool.hatch.build.targets.wheel]
packages = ["src/hearme_broker"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
filterwarnings = [
    "ignore::DeprecationWarning",
]

[tool.ruff]
line-length = 100
target-version = "py311"
