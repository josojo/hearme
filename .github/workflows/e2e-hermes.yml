name: e2e (hermes)

# End-to-end test that drives a real Hermes agent through the broker.
# Separate from the main `python` workflow because it:
#   * requires the OPEN_ROUTER_API_KEY secret (no fork PRs),
#   * installs the optional `hermes-agent` PyPI package,
#   * spins up Postgres in a service container.
#
# Skipped automatically when the secret is missing — keeps fork PRs green.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: hermes-skill end-to-end
    runs-on: ubuntu-latest
    # Skip on PRs from forks (no secret access). Manual runs and pushes proceed.
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: hearme
          POSTGRES_USER: hearme_admin
          POSTGRES_PASSWORD: hearme_admin_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hearme_admin -d hearme"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            packages/skill/pyproject.toml
            packages/broker/pyproject.toml

      - name: Apply schema + roles to Postgres
        env:
          PGPASSWORD: hearme_admin_dev
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client
          psql -h 127.0.0.1 -U hearme_admin -d hearme -f packages/web/drizzle/0000_init.sql
          psql -h 127.0.0.1 -U hearme_admin -d hearme -f db/init/02-roles.sql

      - name: Install broker + skill
        run: |
          python -m pip install --upgrade pip
          # broker is a path dependency for the e2e test (uvicorn launches it).
          python -m pip install -e "packages/broker[dev]"
          # skill with the [hermes] extra pulls in hermes-agent from PyPI.
          python -m pip install -e "packages/skill[dev,hermes]"

      - name: Run e2e test
        env:
          # Mirror the .env spelling the user ships locally; the test also
          # accepts OPENROUTER_API_KEY. Skipped if missing.
          OPEN_ROUTER_API_KEY: ${{ secrets.OPEN_ROUTER_API_KEY }}
          # Steer testcontainers off — we use the GH Actions service Postgres
          # directly via the e2e helpers' DSN inputs.
          HEARME_E2E_PG_DSN: postgres://hearme_admin:hearme_admin_dev@127.0.0.1:5432/hearme
        working-directory: packages/skill
        run: |
          if [ -z "$OPEN_ROUTER_API_KEY" ]; then
            echo "OPEN_ROUTER_API_KEY not set — skipping e2e."
            exit 0
          fi
          pytest -v tests/test_e2e_hermes.py
